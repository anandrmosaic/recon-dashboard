            <div style="font-size:11px;color:#888;margin-top:4px">AWBs — waiting on UPS to send form</div>
          </div>
          <div style="background:#fffbf0;border-radius:10px;padding:14px;border:1px solid #ffe0b2;border-left:4px solid #e65100">
            <div style="font-size:10px;font-weight:700;color:#e65100;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">🟡 Form Received — Pending Pay</div>
            <div style="font-size:28px;font-weight:800;color:#e65100;line-height:1">${filedPend.length}</div>
            <div style="font-size:11px;color:#888;margin-top:4px">Submitted to UPS · awaiting payment</div>
          </div>
          <div style="background:#f0fdf4;border-radius:10px;padding:14px;border:1px solid #c8e6c9;border-left:4px solid #2e7d32">
            <div style="font-size:10px;font-weight:700;color:#2e7d32;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">✅ Amount Received</div>
            <div style="font-size:28px;font-weight:800;color:#2e7d32;line-height:1">${amtRcvd.length} <span style="font-size:13px;font-weight:500;color:#888">AWBs</span></div>
            <div style="font-size:14px;font-weight:700;color:#2e7d32;margin-top:4px">${fmtInr(totAmt)}</div>
          </div>
        </div>
      </div>`;

    <!-- Footer -->
    <div class="footer">
      <div class="footer-left">
        <i class="fas fa-info-circle me-1"></i>
        Data auto-refreshes every 5 minutes. Weekly email every Monday 12:01 PM IST.

        <button class="btn-export" onclick="exportDashboard()">
          <i class="fas fa-file-excel"></i> Export Excel

          <i class="fas fa-paper-plane"></i> Send Report Email Now
        </button>

  document.getElementById('mainContent').innerHTML = html;

    chartInstances.c1 = new Chart(document.getElementById('channelLostChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: months,
        datasets: Object.entries(channels).map(([name, rows]) => ({
          label: name,
          data: rows.map(r => r.lost_stock || 0),
          backgroundColor: (colors[name] || '#666') + 'cc',
          borderColor: colors[name] || '#666',
          borderWidth: 1, borderRadius: 4
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 11 } } }
        }
      }
    });
  }

  // ── Chart: Cases Raised — Monthly Trend
  if (document.getElementById('caseTrendChart')) {
    const disc = (data.discrepancies || []).filter(d => d.case_raise_date);
    // Build ordered month buckets from the filtered months list
    const caseCounts = {};
    months.forEach(m => { caseCounts[m] = 0; });
    disc.forEach(d => {
      // Parse case_raise_date into "Month YYYY" label
      const raw = d.case_raise_date;
      let label = null;
      const parts = raw.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
      if (parts) {
        const [, a, b, y] = parts;
        const yr = y.length === 2 ? '20' + y : y;
        // Try dd/mm/yyyy first then mm/dd/yyyy
        const dayFirst = new Date(`${yr}-${b.padStart(2,'0')}-${a.padStart(2,'0')}`);
        const dt = isNaN(dayFirst) ? new Date(`${yr}-${a.padStart(2,'0')}-${b.padStart(2,'0')}`) : dayFirst;
        if (!isNaN(dt)) {
          label = dt.toLocaleString('en-US', { month: 'long' }) + ' ' + dt.getFullYear();
        }
      }
      if (label && caseCounts.hasOwnProperty(label)) caseCounts[label]++;
    });
    const caseLabels = months;
    const caseData = months.map(m => caseCounts[m] || 0);
    const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim() || '#1b3a2d';
    chartInstances.caseTrend = new Chart(document.getElementById('caseTrendChart').getContext('2d'), {
      type: 'line',
      data: {
        labels: caseLabels,
        datasets: [{
          label: 'Cases Raised',
          data: caseData,
          borderColor: primaryColor,
          backgroundColor: primaryColor + '18',
          borderWidth: 2.5,
          pointBackgroundColor: primaryColor,
          pointRadius: 5,
          pointHoverRadius: 7,
          fill: true,
          tension: 0.35
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y} case${ctx.parsed.y !== 1 ? 's' : ''} raised`
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: { beginAtZero: true, grid: { color: '#f0f0f0' }, ticks: { font: { size: 11 }, stepSize: 1 } }
        }
      }
    });
  }

  // ── Chart 2: Loss Distribution Donut (channel view)
  if (showChannel && document.getElementById('lossDistChart')) {
    const totByChannel = Object.entries(channels).map(([name, rows]) => ({
      name, total: rows.reduce((s, r) => s + (r.lost_stock || 0), 0)
    })).filter(c => c.total > 0);
    const grandTotal = totByChannel.reduce((s, c) => s + c.total, 0);
    chartInstances.c2 = new Chart(document.getElementById('lossDistChart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: totByChannel.map(c => c.name),
        datasets: [{ data: totByChannel.map(c => c.total), backgroundColor: totByChannel.map(c => colors[c.name] || '#666'), borderWidth: 2, borderColor: '#fff' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        cutout: '68%'
      }
    });
    // Custom right-side legend
    const legendEl = document.getElementById('lossDistLegend');
    if (legendEl) {
      legendEl.innerHTML = totByChannel.map(c => {
        const pct = grandTotal > 0 ? (c.total / grandTotal * 100).toFixed(1) : 0;
        const col = colors[c.name] || '#666';
        return `
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:11px;height:11px;border-radius:50%;background:${col};flex-shrink:0"></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:11px;font-weight:600;color:var(--text);white-space:nowrap">${c.name}</div>
              <div style="font-size:10px;color:var(--text-muted)">${formatNum(c.total)} units</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:14px;font-weight:800;color:${col}">${pct}%</div>
              <div style="font-size:10px;color:var(--text-muted)">of total</div>
            </div>
          </div>`;
      }).join(`<div style="height:1px;background:var(--border-light);margin:2px 0"></div>`);
    }
  }

  // ── Chart 3: Recovery by Month (channel view)
  if (showChannel && document.getElementById('recoveryChart')) {
    const grandRows = cd.grand_total || [];
    chartInstances.c3 = new Chart(document.getElementById('recoveryChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: months,
        datasets: [
          { label: 'Expected ($)', data: grandRows.map(r => r.expected_reimburs || 0), backgroundColor: '#ff8f0066', borderColor: '#e65100', borderWidth: 1, borderRadius: 4 },
          { label: 'Recovered ($)', data: grandRows.map(r => r.actual_reimbursed || 0), backgroundColor: '#2e7d3266', borderColor: '#2e7d32', borderWidth: 1, borderRadius: 4 },
          { label: 'Recovery Rate (%)', type: 'line', data: grandRows.map(r => r.expected_reimburs > 0 ? +((r.actual_reimbursed / r.expected_reimburs * 100).toFixed(1)) : 0),
            yAxisID: 'y2', borderColor: '#7c3aed', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 4, tension: 0.3 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 11 }, callback: v => '$' + v } },
          y2: { position: 'right', grid: { display: false }, min: 0, max: 100, ticks: { font: { size: 10 }, callback: v => v + '%' } }
        }
      }
    });

  // ── Chart 4: Transporter Lost (bar)
  if (document.getElementById('transporterChart')) {
    const tData = Object.entries(transporters).map(([name, rows]) => ({
      name, lost: rows.reduce((s, r) => s + (r.lost_stock || 0), 0)
    })).filter(t => t.lost > 0).sort((a, b) => b.lost - a.lost);
    chartInstances.c4 = new Chart(document.getElementById('transporterChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: tData.map(t => t.name),
        datasets: [{ label: 'Lost Units', data: tData.map(t => t.lost), backgroundColor: tData.map(t => (colors[t.name] || '#666') + 'cc'), borderColor: tData.map(t => colors[t.name] || '#666'), borderWidth: 1, borderRadius: 4 }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 11 } } },
          y: { grid: { display: false }, ticks: { font: { size: 11 } } }
        }
      }
    });
  }

  // ── Chart 5: Transporter Distribution Donut (carrier-only view)
  if (!showChannel && document.getElementById('transporterDistChart')) {
    const tDist = Object.entries(transporters).map(([name, rows]) => ({
      name, lost: rows.reduce((s, r) => s + (r.lost_stock || 0), 0)
    })).filter(t => t.lost > 0);
    chartInstances.c5 = new Chart(document.getElementById('transporterDistChart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: tDist.map(t => t.name),
        datasets: [{ data: tDist.map(t => t.lost), backgroundColor: tDist.map(t => colors[t.name] || '#666'), borderWidth: 2, borderColor: '#fff' }]

        plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12 } } },
        cutout: '60%'
      }

  }
}

// ── Export ─────────────────────────────────────────────────────────────────

function exportDashboard() {
  if (!_rawData) return;
  const filtered = applyFilters(_rawData);
  const cd = filtered.channel_data;
  const td = filtered.transporter_data;
  const months = cd.months || [];
  const channels = cd.channels || {};
  const transporters = td.transporters || {};
  const date = new Date().toISOString().slice(0, 10);
  const wb = XLSX.utils.book_new();

  // Sheet 1: Channel Summary (one row per month×channel)
  const chRows = [['Month', 'Channel', 'Qty Sent', 'Lost Stock', 'Expected ($)', 'Recovered ($)', 'Pending ($)']];
  months.forEach((m, i) => {
    Object.entries(channels).forEach(([ch, rows]) => {
      const r = rows[i] || {};
      const pending = (r.expected_reimburs || 0) - (r.actual_reimbursed || 0);
      if ((r.qty_sent || 0) > 0 || (r.lost_stock || 0) > 0)
        chRows.push([m, ch, r.qty_sent || 0, r.lost_stock || 0, r.expected_reimburs || 0, r.actual_reimbursed || 0, +pending.toFixed(2)]);
    });
  });
  const wsChannel = XLSX.utils.aoa_to_sheet(chRows);
  wsChannel['!cols'] = [14, 12, 10, 10, 14, 14, 12].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, wsChannel, 'Channel Summary');

  // Sheet 2: Transporter Summary
  const trRows = [['Transporter', 'Total Shipped', 'Total Lost', 'Loss %']];
  Object.entries(transporters).forEach(([name, rows]) => {
    const shipped = rows.reduce((s, r) => s + (r.qty_sent || 0), 0);
    const lost    = rows.reduce((s, r) => s + (r.lost_stock || 0), 0);
    if (shipped > 0 || lost > 0)
      trRows.push([name, shipped, lost, shipped > 0 ? +((lost / shipped * 100).toFixed(2)) : 0]);
  });
  const wsTr = XLSX.utils.aoa_to_sheet(trRows);
  wsTr['!cols'] = [20, 14, 12, 10].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, wsTr, 'Transporter Summary');

  XLSX.writeFile(wb, `recon-dashboard-${date}.xlsx`);
}

function exportDiscrepancy() {
  if (!_rawData) return;
  const disc = applyFilters(_rawData).discrepancies || [];
  const date = new Date().toISOString().slice(0, 10);
  const wb   = XLSX.utils.book_new();

  const getCaseStatus = d => {
    if (d.is_closed) return 'Resolved / Archived';
    if (d.case_raise_date) return 'In Progress';
    return 'Needs Action';
  };
  const rows = [
    ['Case Status',
     'Month', 'Shipment AWB', 'IBR / Label', 'Channel', 'Transporter',
     'Product Name', 'Uniware Code', 'Invoice No',
     'Qty Sent', 'Lost Units', 'Expected ($)', 'Recovered ($)', 'Pending ($)',
     'Reimb. Status', 'Case Raise Date', 'Days Open', 'Aging Bucket', 'Remark'],
    ...disc.map(d => [
      getCaseStatus(d),
      d.month, d.awb, d.platform_label, d.channel, d.transporter,
      d.product_name || '', d.uniware_code || '', d.invoice_no || '',
      d.qty_sent, d.lost_stock, d.expected_reimburs, d.actual_reimbursed, d.pending,
      d.reimbursement_status,
      d.case_raise_date || '', d.days_open != null ? d.days_open : '', d.aging_bucket || '',
      d.remark
    ])
  ];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [18, 14, 18, 18, 10, 14, 24, 14, 14, 10, 10, 13, 13, 12, 14, 14, 10, 14, 30].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, ws, 'Discrepancy Shipments');
  XLSX.writeFile(wb, `discrepancy-shipments-${date}.xlsx`);
}

// ── Data loading ───────────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch('/api/data');
    const json = await res.json();
    if (json.data) {
      _rawData = json.data;
      _lastUpdated = json.last_updated;
      initFilters(_rawData);
      // Show total discrepancy count on tab badge
      const total = (_rawData.discrepancies || []).length;
      const badge = document.getElementById('discBadge');
      if (badge) { badge.textContent = total; badge.style.display = total > 0 ? 'inline' : 'none'; }
      applyAndRender();
    } else {
      document.getElementById('mainContent').innerHTML =
        '<div class="loading"><p style="color:#c62828">Failed to load data. Check Google Sheets connection.</p></div>';
    }
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      '<div class="loading"><p style="color:#c62828">Error: ' + e.message + '</p></div>';
  }
}

async function refreshData() {
  showToast('Refreshing data...', 'success');
  await fetch('/api/refresh');
  await loadData();
  showToast('Data refreshed!', 'success');
}

async function sendTestEmail() {
  showToast('Sending email...', 'success');
  try {
    const res = await fetch('/api/send-test-email');
    const json = await res.json();
    if (json.status === 'ok') showToast('Email sent successfully!', 'success');
    else showToast('Error: ' + json.message, 'error');
  } catch(e) { showToast('Failed to send email', 'error'); }
}

// Close dropdowns when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('monthDropdownWrap')?.contains(e.target)) {
    document.getElementById('monthDdMenu')?.classList.remove('open');
    document.getElementById('monthDdBtn')?.classList.remove('open');
  }
  if (!document.getElementById('channelDropdownWrap')?.contains(e.target)) {
    document.getElementById('channelDdMenu')?.classList.remove('open');
    document.getElementById('channelDdBtn')?.classList.remove('open');
  }
  if (!document.getElementById('yearDropdownWrap')?.contains(e.target)) {
    document.getElementById('yearDdMenu')?.classList.remove('open');
    document.getElementById('yearDdBtn')?.classList.remove('open');
  }
});

// Load on start + auto-refresh every 5 min
loadData();
setInterval(() => fetch('/api/refresh').then(() => {
  fetch('/api/data').then(r => r.json()).then(j => {
    if (j.data) { _rawData = j.data; _lastUpdated = j.last_updated; applyAndRender(); }
  });
}), 20 * 60 * 1000);
</script>

<script>
let _editRowIndex = null;

function openEditModal(rowIndex, awb, status, actual, raiseDate, closeDate, remark) {
  _editRowIndex = rowIndex;
  document.getElementById('editModalAWB').textContent = 'AWB: ' + awb;
  document.getElementById('ef_reimbursement_status').value = status || '';
  document.getElementById('ef_actual_reimbursed').value    = actual || '';
  document.getElementById('ef_case_raise_date').value      = raiseDate || '';
  document.getElementById('ef_case_close_date').value      = closeDate || '';
  document.getElementById('ef_remark').value               = remark || '';
  const modal = document.getElementById('editModal');
  modal.style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  _editRowIndex = null;
}

async function saveEditModal() {
  if (!_editRowIndex) return;
  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

  const fields = {
    reimbursement_status: document.getElementById('ef_reimbursement_status').value,
    actual_reimbursed:    document.getElementById('ef_actual_reimbursed').value,
    case_raise_date:      document.getElementById('ef_case_raise_date').value,
    case_close_date:      document.getElementById('ef_case_close_date').value,
    remark:               document.getElementById('ef_remark').value,
  };

  try {
    const updates = Object.entries(fields).filter(([_, v]) => v !== '' && v !== null);
    for (const [field, value] of updates) {
      const res = await fetch('/api/update-row', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ row_index: _editRowIndex, field, value })
      });
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message || 'Update failed');
    }
    closeEditModal();
    showToast('Row updated successfully in Google Sheet!', 'success');
    setTimeout(() => { loadData(); }, 1500);
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Save to Sheet';
  }
}

// Close modal on backdrop click
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
</script>
